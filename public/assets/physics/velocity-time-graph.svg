<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Velocity-time graph</title>
  <desc id="desc">A velocity-time graph with three segments representing acceleration, constant velocity, and deceleration.</desc>
  <rect width="1200" height="720" fill="#fbf6ef" rx="36" />
  <g transform="translate(120 70)">
    <rect x="0" y="0" width="980" height="560" rx="28" fill="#fffdf9" stroke="#d6c7b5" stroke-width="2" />
    <g stroke="#eadfce" stroke-width="1">
      <line x1="80" y1="80" x2="80" y2="480" />
      <line x1="220" y1="80" x2="220" y2="480" />
      <line x1="360" y1="80" x2="360" y2="480" />
      <line x1="500" y1="80" x2="500" y2="480" />
      <line x1="640" y1="80" x2="640" y2="480" />
      <line x1="780" y1="80" x2="780" y2="480" />
      <line x1="920" y1="80" x2="920" y2="480" />
      <line x1="80" y1="480" x2="920" y2="480" />
      <line x1="80" y1="400" x2="920" y2="400" />
      <line x1="80" y1="320" x2="920" y2="320" />
      <line x1="80" y1="240" x2="920" y2="240" />
      <line x1="80" y1="160" x2="920" y2="160" />
      <line x1="80" y1="80" x2="920" y2="80" />
    </g>
    <g stroke="#38536b" stroke-linecap="round" stroke-width="5">
      <line x1="80" y1="480" x2="80" y2="70" />
      <line x1="70" y1="480" x2="940" y2="480" />
    </g>
    <g fill="#38536b" font-family="Arial, sans-serif" font-size="26">
      <text x="34" y="82">v (m/s)</text>
      <text x="916" y="525">t (s)</text>
    </g>
    <g fill="#6e7f8c" font-family="Arial, sans-serif" font-size="22">
      <text x="72" y="514">0</text>
      <text x="212" y="514">2</text>
      <text x="352" y="514">4</text>
      <text x="492" y="514">6</text>
      <text x="632" y="514">8</text>
      <text x="772" y="514">10</text>
      <text x="912" y="514">12</text>
      <text x="30" y="486">0</text>
      <text x="18" y="406">2</text>
      <text x="18" y="326">4</text>
      <text x="18" y="246">6</text>
      <text x="18" y="166">8</text>
    </g>
    <path d="M80 480 L220 320 L500 320 L640 480" fill="none" stroke="#b6612a" stroke-linecap="round" stroke-linejoin="round" stroke-width="12" />
    <path d="M80 480 L220 320 L500 320 L640 480 L80 480 Z" fill="#efc8aa" opacity="0.55" />
    <g fill="#b6612a">
      <circle cx="80" cy="480" r="10" />
      <circle cx="220" cy="320" r="10" />
      <circle cx="500" cy="320" r="10" />
      <circle cx="640" cy="480" r="10" />
    </g>
    <g fill="#2d6f6b" font-family="Arial, sans-serif" font-size="24" font-weight="700">
      <text x="114" y="370">Acceleration</text>
      <text x="288" y="286">Constant velocity</text>
      <text x="502" y="370">Deceleration</text>
    </g>
    <rect x="692" y="112" width="210" height="114" rx="20" fill="#fff4ea" stroke="#efc8aa" stroke-width="2" />
    <text x="720" y="150" fill="#8b4f27" font-family="Arial, sans-serif" font-size="22" font-weight="700">Area = displacement</text>
    <text x="720" y="185" fill="#6e5344" font-family="Arial, sans-serif" font-size="20">Triangle + rectangle + triangle</text>
  </g>
</svg>
